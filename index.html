<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <title>Movie Watchlist</title>
</head>

<body>
    <header>
        <h1>Find your film</h1>
        <a href="watchlist.html">My Watchlist</a>
    </header>
    <main>
        <div class="search-container">
            <input type="text" placeholder="Blade Runner" name="search" id="search">
            <button id="search-btn">Search</button>
        </div>
        <div class="film-list">

            <img src="images/movie-ico.png" alt="">
            <h2>Start exploring</h2>
            <div class="film">
                <img src="images/poster.png" alt="">
                <div class="film-info">

                    <div class="film-title">
                        <h3>Blade Runner</h3>
                        <img src="images/rate-ico.png" alt="">
                        8.1
                    </div>
                    <div class="film-details">
                        <p>160 min</p>
                        <p>action drama</p>
                        <button><img class="add-icon" src="images/add.png" alt=""> <p>Watchlist</p></button>
                    </div>

                    <p class="film-desc">A blade runner must pursue and terminate four replicants who stole a ship in space, and have returned to Earth to find their creator.</p>

                </div>

            </div>

        </div>

    </main>
    <script src="index.js"></script>
</body>

</html>
