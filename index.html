<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <title>Movie Watchlist</title>
</head>

<body>
    <header>
        <h1>Find your film</h1>
        <a href="watchlist.html"><i class="fa-solid fa-list"></i>  My Watchlist</a>
    </header>
    <main>
        <div class="search-container">
            <img class="search-icon" src="images/search.png" alt="">
            <input type="text" placeholder="Blade Runner" name="search" id="search">
            <button id="search-btn">Search</button>
        </div>
        <div class="film-list" id="film-list">
            <img src="images/movie-ico.png" alt="">
            <h2>Start exploring</h2>
            

        </div>

    </main>
    <script src="index.js"></script>
</body>

</html>
